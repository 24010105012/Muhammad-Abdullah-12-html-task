<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>

body {
    
    background-image: 
        url('https://sktlms.umt.edu.pk/moodle/pluginfile.php/1/core_admin/logo/0x200/1765947176/umt%20logo%202020.png'), 
        url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRxPgLzL6Smi9ql6omOIsQUUZc4D9dMNaSQ7g&s'); 

    
    background-size: 150px auto, cover; 

   
    background-position:  center top,center ; 

    
    background-repeat: no-repeat, no-repeat;

    
   
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: end;
}

.box{
width: 350px;
    background: white;
    padding: 18px;
    margin-bottom: 50px;
    margin-left: auto;
    margin-right: auto;
    border-radius: 8px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
box-sizing: border-box;
}
input[type="checkbox"] {
    width: auto; 
}

button{
width:100%;
padding:10px;

color:white;
border:1;
}

</style>

</head>

<body>

<div class="box">

<h3>Already have an account?
</h3>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">


<input type="checkbox"> Remember username

<br><br>

<button style = "background-color: #0076a3; color: white;">Log in</button>

<br><br>

<a href="#">Forgotten your username or password
</a>


</body>
</html>
